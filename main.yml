apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  name: expense-app-ingress
  namespace: expense
spec:
  ingressClassName: nginx  # Change to match your actual ingress class
  rules:
    - host: expense.durgasri.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: expense-service
                port:
                  number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: expense-service
  namespace: expense
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 81
  type: ClusterIP  # Use ClusterIP instead of LoadBalancer
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: expense
  labels:
    app.kubernetes.io/name: nginx
spec:
  containers:
    - name: nginx
      image: chandrahari296/frontend:v2.0.0
      ports:
        - containerPort: 81
